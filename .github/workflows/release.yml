name: Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_RELEASE_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          skip-github-release: true

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: true

      - id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if git cat-file -e "${BEFORE_SHA}:.github/.release-please-manifest.json" 2>/dev/null &&
            git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | grep -q '^.github/.release-please-manifest.json$'; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - id: version
        if: ${{ steps.changed.outputs.release == 'true' }}
        run: |
          version="$(jq -r '."."' .github/.release-please-manifest.json)"
          if test -z "$version" || test "$version" = "null"; then
            echo "version is missing in .release-please-manifest.json" >&2
            exit 1
          fi
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: ${{ steps.changed.outputs.release == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          tag="$RELEASE_TAG"
          sha="$GITHUB_SHA"
          remote_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"

          if test -n "$remote_sha"; then
            if test "$remote_sha" != "$sha"; then
              echo "remote tag ${tag} points to ${remote_sha}, not ${sha}" >&2
              exit 1
            fi
            git fetch --tags --force origin "refs/tags/${tag}:refs/tags/${tag}"
          else
            git tag "$tag" "$sha"
            git push origin "$tag"
          fi

      - if: ${{ steps.changed.outputs.release == 'true' }}
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        if: ${{ steps.changed.outputs.release == 'true' }}

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: ${{ steps.changed.outputs.release == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aquaproj/aqua-installer@5e54e5cee8a95ee2ce7c04cb993da6dfad13e59c # v3.1.2
        if: ${{ steps.changed.outputs.release == 'true' }}
        with:
          aqua_version: v2.25.1
          aqua_opts: ""

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        if: ${{ steps.changed.outputs.release == 'true' }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
