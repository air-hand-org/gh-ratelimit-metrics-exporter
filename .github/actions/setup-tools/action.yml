name: setup tools
description: Set up project tools with aqua and mise.

inputs:
  aqua:
    description: Install aqua-managed tools.
    default: "true"
runs:
  using: composite
  steps:
    - if: ${{ inputs.aqua == 'true' }}
      uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.61.0
        aqua_opts: ""
    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        cache: false
