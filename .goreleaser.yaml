version: 2

project_name: gh-ratelimit-metrics-exporter

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gh-ratelimit-metrics-exporter
    dir: app
    main: .
    binary: gh-ratelimit-metrics-exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

dockers_v2:
  - dockerfile: "Dockerfile"
    images:
      - "ghcr.io/air-hand/{{ .ProjectName }}"
    tags:
      - "v{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
